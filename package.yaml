verbatim:
  cabal-version: 3.0
name: wreq-but-optics
version: 0.5.4.0
synopsis: Optics bindings for the wreq library
description: >
  Provides optics implementations of the lenses in wreq,
  as well as a re-export of Network.Wreq (as Network.Wreq.ButOptics)
  substituting lenses for optics.

  In short: Wreq, but optics 😉
github: YourFin/wreq-but-optics
license: MIT
license-file: LICENSE
author: Patrick Nuckolls
maintainer: src@patrickn_REMOVE_FIRST_UNDERSCORE_AND_LATER.co
category: Web
tested-with: GHC == { 9.6.7, 9.8.4, 9.10.3, 9.12.2 }

ghc-options: -Wall

library:
  source-dirs: src
  dependencies:
    - base >= 4.18 && < 5.0
    - wreq >= 0.5.4 && < 0.6.0
    - optics-core >= 0.4
    - http-client >= 0.6
    - http-types >= 0.8
    - bytestring >= 0.9
    - text
    - time >= 1.5
    - attoparsec >= 0.11.1.0
    - mime-types

tests:
  unit-tests:
    main: Spec.hs
    build-tools:
     - hspec-discover:hspec-discover
    dependencies:
     - wreq-but-optics
     - base
     - hspec
     - hspec-contrib
     - hspec-discover
     - wreq
     - optics-core
     - http-client
     - http-types
     - bytestring
     - text
     - time
     - attoparsec
    source-dirs: test
    ghc-options:
     - -Wx-no-partial
